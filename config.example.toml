# iidx-scratch-bridge sample config.
#
# Copy this file to config.toml and edit values to match your hardware.
# Use `scratch-bridge.exe --list` to find your VID/PID, then
# `--dump` to confirm the byte offsets if you have a different unit.

[device]
# Konami IIDX entry model. Verified values for one production unit:
#   VID 0x1ccf  PID 0x1018  (joystick HID interface)
# If --list reports a different PID for your unit, update it here.
vid = 0x1ccf
pid = 0x1018

# Byte offset of the scratch wheel position inside the Input Report.
# 0 = the very first byte. Use --dump to verify if your firmware
# revision differs.
scratch_axis_byte_index = 0

# Half-open [start, end) range of bytes holding the button bitmap.
# [2, 4) means bytes 2 and 3 ŌĆö that gives 16 bits (b0..b15).
buttons_byte_range = [2, 4]

# Optional. Set to a non-zero value if your device uses HID Report IDs
# and you need to filter on one. Leave 0 otherwise.
report_id = 0

[scratch]
# Minimum accumulated delta on the scratch axis before we emit a pulse.
# Smaller = more sensitive. The detector accumulates sub-threshold
# motion so slow rotations still register.
threshold = 2

# Length of each scratch pulse, in milliseconds. Stock PS2 controllers
# fire an ~133 ms one-shot per wheel motion; matches IIDX 14 GOLD
# timing. While the wheel keeps moving in one direction, the key is
# released and re-pressed every `pulse_duration_ms` so ķĆŻńÜ┐ charts
# register as multiple hits instead of one stuck key.
pulse_duration_ms = 133

# Keys sent for the two scratch directions. Set these in PCSX2 as IIDX
# scratch Up / Down (typically the d-pad).
up_key   = "UP"
down_key = "DOWN"

[buttons]
# Bit position inside the bitmap -> key name.
# Verified bit layout for the same entry model: 1ķŹĄ..7ķŹĄ live on
# bits 0..6 of byte 2, START/SELECT on bits 0/1 of byte 3 (= bits 8/9
# in the 16-bit map).
# Names accepted: A-Z, 0-9, F1-F24, plus ENTER/BACKSPACE/SPACE/TAB/
# ESC/SHIFT/CTRL/ALT/UP/DOWN/LEFT/RIGHT/HOME/END/PAGEUP/PAGEDOWN/
# INSERT/DELETE.
b0 = "Z"          # 1ķŹĄ
b1 = "S"          # 2ķŹĄ
b2 = "X"          # 3ķŹĄ
b3 = "D"          # 4ķŹĄ
b4 = "C"          # 5ķŹĄ
b5 = "F"          # 6ķŹĄ
b6 = "V"          # 7ķŹĄ
b8 = "ENTER"      # START
b9 = "BACKSPACE"  # SELECT
