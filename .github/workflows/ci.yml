name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      # The HID layer uses bearsh/hid which links against hidapi+libudev
      # when CGo is on. Unit tests don't touch real hardware, so we
      # disable CGo and let bearsh/hid fall back to its no-op stub.
      - env:
          CGO_ENABLED: "0"
        run: go vet ./...
      - env:
          CGO_ENABLED: "0"
        run: go test ./...
